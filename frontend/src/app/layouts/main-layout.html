<mat-sidenav-container class="sidenav-container">
  <!-- Side Navigation -->
  <mat-sidenav #drawer class="sidenav" fixedInViewport
      [attr.role]="'navigation'"
      [mode]="'side'"
      [opened]="true">
    <mat-toolbar class="brand-toolbar">
      <mat-icon class="brand-icon">check_circle</mat-icon>
      <span class="brand-name">TaskFlow</span>
    </mat-toolbar>

    <mat-nav-list class="nav-list">
      <a mat-list-item routerLink="/dashboard" routerLinkActive="active-link">
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <span matListItemTitle>Dashboard</span>
      </a>
      <a mat-list-item routerLink="/todos" routerLinkActive="active-link" [routerLinkActiveOptions]="{exact: false}">
        <mat-icon matListItemIcon>assignment</mat-icon>
        <span matListItemTitle>My Tasks</span>
      </a>
      <a mat-list-item routerLink="/profile" routerLinkActive="active-link">
        <mat-icon matListItemIcon>person</mat-icon>
        <span matListItemTitle>Profile</span>
      </a>
      
      <div class="nav-divider"></div>
      
      <button mat-list-item (click)="logout()">
        <mat-icon matListItemIcon>logout</mat-icon>
        <span matListItemTitle>Sign Out</span>
      </button>
    </mat-nav-list>
  </mat-sidenav>

  <!-- Main Content Area -->
  <mat-sidenav-content class="content-area">
    <mat-toolbar color="primary" class="main-toolbar">
      <button
        type="button"
        aria-label="Toggle sidenav"
        mat-icon-button
        (click)="drawer.toggle()"
        class="menu-toggle-btn">
        <mat-icon aria-label="Side nav toggle icon">menu</mat-icon>
      </button>
      <span class="toolbar-spacer"></span>

      <!-- Action Items -->
      <div class="toolbar-actions">
        <!-- Theme Toggle -->
        <button mat-icon-button (click)="toggleTheme()" [matTooltip]="isDarkMode ? 'Switch to Light Mode' : 'Switch to Dark Mode'">
          <mat-icon>{{ isDarkMode ? 'light_mode' : 'dark_mode' }}</mat-icon>
        </button>

        <!-- User Dropdown Menu -->
        <button mat-button [matMenuTriggerFor]="profileMenu" class="user-menu-btn" *ngIf="currentUser">
          <mat-icon>account_circle</mat-icon>
          <span class="user-display-name">{{ currentUser.name }}</span>
          <mat-icon class="dropdown-arrow">arrow_drop_down</mat-icon>
        </button>
        <mat-menu #profileMenu="matMenu" xPosition="before">
          <button mat-menu-item routerLink="/profile">
            <mat-icon>person</mat-icon>
            <span>My Profile</span>
          </button>
          <button mat-menu-item routerLink="/todos">
            <mat-icon>assignment</mat-icon>
            <span>My Tasks</span>
          </button>
          <mat-divider></mat-divider>
          <button mat-menu-item (click)="logout()">
            <mat-icon>logout</mat-icon>
            <span>Sign Out</span>
          </button>
        </mat-menu>
      </div>
    </mat-toolbar>

    <!-- Routed Page Wrapper -->
    <main class="page-content">
      <router-outlet></router-outlet>
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
