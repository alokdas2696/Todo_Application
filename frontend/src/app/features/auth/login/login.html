<div class="auth-container">
  <mat-card class="auth-card">
    <mat-card-header>
      <div class="auth-header">
        <mat-icon class="auth-logo">check_circle</mat-icon>
        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-subtitle">Sign in to manage your tasks</p>
      </div>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
        <!-- Email field -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email Address</mat-label>
          <input matInput type="email" formControlName="email" placeholder="name@example.com" autocomplete="email">
          <mat-icon matSuffix>email</mat-icon>
          <mat-error *ngIf="loginForm.get('email')?.hasError('required')">Email is required</mat-error>
          <mat-error *ngIf="loginForm.get('email')?.hasError('email')">Please enter a valid email</mat-error>
        </mat-form-field>

        <!-- Password field -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password" autocomplete="current-password">
          <button type="button" mat-icon-button matSuffix (click)="hidePassword = !hidePassword" [attr.aria-label]="'Hide password'" [attr.aria-pressed]="hidePassword">
            <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
          </button>
          <mat-error *ngIf="loginForm.get('password')?.hasError('required')">Password is required</mat-error>
          <mat-error *ngIf="loginForm.get('password')?.hasError('minlength')">Password must be at least 6 characters</mat-error>
        </mat-form-field>

        <!-- Submit Button -->
        <button mat-flat-button color="primary" type="submit" [disabled]="loginForm.invalid || isLoading" class="auth-submit-btn">
          <span *ngIf="!isLoading">Sign In</span>
          <mat-spinner diameter="24" *ngIf="isLoading" class="spinner-center"></mat-spinner>
        </button>
      </form>
    </mat-card-content>

    <mat-card-actions class="auth-actions">
      <span class="auth-redirect">Don't have an account? <a routerLink="/auth/register">Create Account</a></span>
    </mat-card-actions>
  </mat-card>
</div>
