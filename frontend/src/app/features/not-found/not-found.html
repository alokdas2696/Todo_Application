<div class="not-found-container">
  <mat-card class="not-found-card">
    <mat-card-content class="not-found-content">
      <div class="emoji-404">🔍</div>
      <h1 class="title-404">404</h1>
      <h2>Page Not Found</h2>
      <p>The page you are looking for does not exist, has been removed, or is temporarily unavailable.</p>

      <button mat-flat-button color="primary" routerLink="/" class="home-btn">
        <mat-icon>home</mat-icon> Go to Home
      </button>
    </mat-card-content>
  </mat-card>
</div>
